*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1b2d;color:#e8edf5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.nav{display:flex;background:#162236;border-bottom:1px solid #1e3a5f;position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:12px 2px;font-size:11px;font-weight:600;color:#7a9cc4;background:none;border:none;cursor:pointer;text-transform:uppercase;border-bottom:3px solid transparent}

.header{background:#1565c0;padding:16px 16px 12px;text-align:center}
.header h1{font-size:20px;font-weight:700;color:#fff}
.header p{font-size:12px;color:#90caf9;margin-top:3px}
.card{background:#162236;border-radius:12px;margin:12px 12px 0;padding:16px;border:1px solid #1e3a5f}
.card-title{font-size:12px;font-weight:700;color:#4fc3f7;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#1976d2;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-secondary{background:#1e3a5f;color:#90caf9;border:1px solid #2a5080}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;margin-top:8px;display:block}
.btn:disabled{opacity:.4;cursor:not-allowed}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#7a9cc4;font-weight:600;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 12px;background:#0f1b2d;border:1px solid #2a5080;border-radius:8px;color:#e8edf5;font-size:14px;outline:none}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.toggle-group{display:flex;background:#0f1b2d;border-radius:8px;border:1px solid #2a5080;overflow:hidden}
.toggle-btn{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;background:none;color:#7a9cc4;cursor:pointer}

.score-header{background:#162236;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3a5f}
.match-info{font-size:11px;color:#7a9cc4}
.set-info{font-size:12px;font-weight:700;color:#ffd54f}

.team-col{flex:1;padding:16px 12px;text-align:center}

.team-name{font-size:13px;font-weight:700;color:#90caf9;margin-bottom:4px;word-break:break-word}
.team-score{font-size:52px;font-weight:800;line-height:1;color:#fff}
.team-score.winning{color:#66bb6a}
.team-sets{font-size:12px;color:#7a9cc4;margin-top:4px}
.score-btns{display:flex}
.score-btn{flex:1;padding:18px;font-size:18px;font-weight:700;border:none;cursor:pointer;background:#1565c0;color:#fff}
.score-btn:first-child{border-right:1px solid #0d47a1}

.score-actions{display:flex;gap:8px;padding:10px 12px;background:#162236;border-top:1px solid #1e3a5f;flex-wrap:wrap}
.sets-row{display:flex;padding:8px 12px;background:#0d1e30;gap:4px;flex-wrap:wrap}

.set-lose{background:#4a1010;color:#ef9a9a}
.set-ongoing{background:#1a2a40;color:#7a9cc4}

  }

// ---- STANDINGS HELPERS ----
function getStandings(type,group){
  var relevant=Object.values(matches).filter(function(m){
    var league=(m.stage==='group'||m.stage==='league');
    return m.done&&m.locked&&m.type===type&&league&&(type==='doubles'||m.group===group);
  });
  var players={};
  relevant.forEach(function(m){
    [m.team1,m.team2].forEach(function(t){if(!players[t])players[t]={name:t,mp:0,mw:0,ml:0,pts:0,sw:0,sl:0,pf:0,pa:0};});
    players[m.team1].mp++;players[m.team2].mp++;
    var w=m.winner===1?m.team1:m.team2,l=m.winner===1?m.team2:m.team1;
    players[w].mw++;players[w].pts+=3;players[l].ml++;
    m.sets.forEach(function(s){
      players[m.team1].pf+=s.s1;players[m.team1].pa+=s.s2;
      players[m.team2].pf+=s.s2;players[m.team2].pa+=s.s1;
      if(s.winner===1){players[m.team1].sw++;players[m.team2].sl++;}
      else{players[m.team2].sw++;players[m.team1].sl++;}
    });
  });
  return Object.values(players).sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    var sd=(b.sw-b.sl)-(a.sw-a.sl);if(sd!==0)return sd;
    return(b.pf-b.pa)-(a.pf-a.pa);
  });
}
function getKOWinner(fid){
  var m=Object.values(matches).find(function(x){return x.fid===fid&&x.done&&x.locked;});
  return m?(m.winner===1?m.team1:m.team2):null;
}

    document.getElementById('page-'+id).classList.remove('active');
    document.getElementById('nav-'+id).classList.remove('active');
  });
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='home') renderHome();
  if(p==='score'){
    currentMatch=null; scoreMode='singles';
    document.getElementById('score-tab-singles').classList.add('active');
    document.getElementById('score-tab-doubles').classList.remove('active');
    showScoreSubview('singles');
  }
  if(p==='table') showStandingsTab(currentStandingsTab);
  if(p==='matches') renderMatches();
}

function renderSinglesFixtures(){
  var el=document.getElementById('singles-fixtures-list');
  el.innerHTML='';

  if(singlesStage==='group'){
    el.innerHTML='<div class="card-title">Group '+singlesGroup+' Fixtures</div>';
    var fixtures=singlesGroup==='A'?SINGLES_A_FIXTURES:SINGLES_B_FIXTURES;
    fixtures.forEach(function(fix){
      var played=Object.values(matches).find(function(m){return m.type==='singles'&&m.fid===fix.fid;});
      appendFixtureItem(el,fix.fid,fix.team1,fix.team2,played,'league',false,'singles');
    });
    return;
  }

  // Knockouts — check if group stage is complete
  var rowsA=getStandings('singles','A');
  var rowsB=getStandings('singles','B');
  var groupADone=rowsA.length===6&&rowsA.every(function(t){return t.mp===5;});
  var groupBDone=rowsB.length===6&&rowsB.every(function(t){return t.mp===5;});
  var groupsDone=groupADone&&groupBDone;

  if(singlesStage==='semifinal'){
    el.innerHTML='<div class="card-title">Singles Semi Finals</div>';
    var sf1t1=groupsDone&&rowsA[0]?rowsA[0].name:'TBD (A 1st)';
    var sf1t2=groupsDone&&rowsB[1]?rowsB[1].name:'TBD (B 2nd)';
    var sf2t1=groupsDone&&rowsA[1]?rowsA[1].name:'TBD (A 2nd)';
    var sf2t2=groupsDone&&rowsB[0]?rowsB[0].name:'TBD (B 1st)';
    var sf1p=Object.values(matches).find(function(m){return m.fid===KO_FIDS.sSF1;});
    var sf2p=Object.values(matches).find(function(m){return m.fid===KO_FIDS.sSF2;});
    appendFixtureItem(el,KO_FIDS.sSF1,sf1t1,sf1t2,sf1p,'SF1',!groupsDone,'singles');
    appendFixtureItem(el,KO_FIDS.sSF2,sf2t1,sf2t2,sf2p,'SF2',!groupsDone,'singles');
    if(!groupsDone){
      var msg=document.createElement('div');
      msg.style.cssText='font-size:13px;color:#455a64;padding:8px 12px';
      msg.textContent='Complete all group stage matches to unlock semi finals.';
      el.appendChild(msg);
    }
  }

  if(singlesStage==='final'){
    el.innerHTML='<div class="card-title">Singles Final</div>';
    var fw1=getKOWinner(KO_FIDS.sSF1);
    var fw2=getKOWinner(KO_FIDS.sSF2);
    var sfsDone=!!(fw1&&fw2);
    var fp=Object.values(matches).find(function(m){return m.fid===KO_FIDS.sFinal;});
    appendFixtureItem(el,KO_FIDS.sFinal,fw1||'TBD (SF1 winner)',fw2||'TBD (SF2 winner)',fp,'Final',!sfsDone,'singles');
    if(!sfsDone){
      var msg2=document.createElement('div');
      msg2.style.cssText='font-size:13px;color:#455a64;padding:8px 12px';
      msg2.textContent='Complete both semi finals to unlock the final.';
      el.appendChild(msg2);
    }
  }
}

function renderFixtures(){
  var el=document.getElementById('fixtures-list');
  el.innerHTML='<div class="card-title">League Fixtures</div>';
  DOUBLES_FIXTURES.forEach(function(fix){
    var played=Object.values(matches).find(function(m){return m.type==='doubles'&&m.fid===fix.fid;});
    appendFixtureItem(el,fix.fid,fix.team1,fix.team2,played,'league',false,'doubles');
  });
  var standings=getStandings('doubles',null);
  // All 10 league matches done = all 5 teams have played 4 matches each
  var leagueDone=standings.length===5&&standings.every(function(t){return t.mp===4;});
  var divider=document.createElement('div');
  divider.style.cssText='border-top:1px solid #1e3a5f;margin-top:4px;padding:8px 0 4px';
  divider.innerHTML='<div class="card-title">Knockouts</div>';
  el.appendChild(divider);
  var sf1t1=leagueDone&&standings[0]?standings[0].name:'TBD (1st)';
  var sf1t2=leagueDone&&standings[3]?standings[3].name:'TBD (4th)';
  var sf2t1=leagueDone&&standings[1]?standings[1].name:'TBD (2nd)';
  var sf2t2=leagueDone&&standings[2]?standings[2].name:'TBD (3rd)';
  var sf1played=Object.values(matches).find(function(m){return m.fid===KO_FIDS.dSF1;});
  var sf2played=Object.values(matches).find(function(m){return m.fid===KO_FIDS.dSF2;});
  var finalPlayed=Object.values(matches).find(function(m){return m.fid===KO_FIDS.dFinal;});
  appendFixtureItem(el,KO_FIDS.dSF1,sf1t1,sf1t2,sf1played,'SF1',!leagueDone,'doubles');
  appendFixtureItem(el,KO_FIDS.dSF2,sf2t1,sf2t2,sf2played,'SF2',!leagueDone,'doubles');
  appendFixtureItem(el,KO_FIDS.dFinal,getKOWinner(KO_FIDS.dSF1)||'TBD',getKOWinner(KO_FIDS.dSF2)||'TBD',finalPlayed,'Final',!(getKOWinner(KO_FIDS.dSF1)&&getKOWinner(KO_FIDS.dSF2)),'doubles');
}

function appendFixtureItem(el,fid,t1,t2,played,label,isLocked,itemType){
  var isDone=played&&played.locked;
  var isLive=played&&!played.locked;
  var item=document.createElement('div');item.className='fixture-item';
  var infoDiv=document.createElement('div');infoDiv.style.flex='1';
  var koTag=label!=='league'?'<span class="ko-badge">'+label+'</span>':'';
  infoDiv.innerHTML='<div class="fixture-teams">'+t1+'<span class="vs">vs</span>'+t2+koTag+'</div>'+
    (isDone?'<div class="fixture-day">Day '+played.day+' · '+(played.winner===1?played.team1:played.team2).split(' ')[0]+' won</div>':'');
  var right=document.createElement('div');right.style.cssText='display:flex;align-items:center;gap:8px;flex-shrink:0';
  var badge=document.createElement('span');
  badge.className='fix-status '+(isDone?'fix-done':isLive?'fix-live':isLocked?'fix-locked':'fix-pending');
  badge.textContent=isDone?'Done':isLive?'Live':isLocked?'Locked':'Pending';
  right.appendChild(badge);
  if(!isDone&&!isLocked){
    var btn=document.createElement('button');btn.className='btn btn-primary btn-sm';
    btn.textContent=isLive?'Resume':'Start';
    btn.addEventListener('click',(function(f,p,tt1,tt2,tp){
      return function(){startFixture(f,p,tt1,tt2,tp);};
    })(fid,played||null,t1,t2,itemType));
    right.appendChild(btn);
  }
  item.appendChild(infoDiv);item.appendChild(right);el.appendChild(item);
}

function startFixture(fid,existing,t1,t2,type){
  var isDoubleKO=(fid===KO_FIDS.dSF1||fid===KO_FIDS.dSF2||fid===KO_FIDS.dFinal);
  var isSingleSF=(fid===KO_FIDS.sSF1||fid===KO_FIDS.sSF2);
  var isSingleF=(fid===KO_FIDS.sFinal);
  var stage=type==='doubles'?(isDoubleKO?(fid===KO_FIDS.dFinal?'final':'knockout'):'league')
                            :(isSingleF?'final':isSingleSF?'semifinal':'group');
  currentMatch=null;
  var m=existing||{
    id:Date.now(),fid:fid,type:type,stage:stage,
    group:type==='singles'&&stage==='group'?singlesGroup:'League',
    day:type==='singles'?singlesDay:doublesDay,
    team1:t1,team2:t2,sets:[],currentSet:{s1:0,s2:0,history:[]},
    setWins:[0,0],done:false,winner:null,locked:false
  };
  if(!existing) saveMatch(m);
  currentMatch=m;showScoreSubview('live');renderLive();
}

// ---- LIVE SCORING ----
function renderLive(){
  var m=currentMatch;if(!m)return;
  var el=document.getElementById('score-live');
  var s=m.currentSet,setNum=m.sets.length+1,canScore=!m.done&&!m.locked;
  var w1=s.s1>s.s2,w2=s.s2>s.s1;
  var setsHtml='';
  m.sets.forEach(function(st,i){setsHtml+='<span class="set-badge '+(st.winner===1?'set-win':'set-lose')+'">Set '+(i+1)+': '+st.s1+'-'+st.s2+'</span>';});
  if(!m.done) setsHtml+='<span class="set-badge set-ongoing">Set '+setNum+': '+s.s1+'-'+s.s2+'</span>';
  var stageLabel=m.stage==='group'?'Group '+(m.group||''):m.stage==='league'?'League':m.stage==='semifinal'?'Semi Final':m.stage==='knockout'?'KO':'Final';
  el.innerHTML=
    '<div class="scoreboard">'+
    '<div class="score-header"><span class="match-info">'+(m.type==='singles'?'Singles':'Doubles')+' · '+stageLabel+' · Day '+m.day+'</span>'+
    '<span class="set-info">'+(m.done?'Match Over':'Set '+setNum+' of 3')+'</span></div>'+
    '<div class="sets-row">'+(setsHtml||'<span style="color:#455a64;font-size:12px">No sets yet</span>')+'</div>'+
    '<div class="teams-row">'+
    '<div class="team-col left"><div class="team-name">'+m.team1+'</div><div class="team-score'+(w1?' winning':'')+'">'+s.s1+'</div><div class="team-sets">Sets: '+m.setWins[0]+'</div></div>'+
    '<div class="team-col"><div class="team-name">'+m.team2+'</div><div class="team-score'+(w2?' winning':'')+'">'+s.s2+'</div><div class="team-sets">Sets: '+m.setWins[1]+'</div></div>'+
    '</div>'+
    '<div class="score-btns">'+
    '<button class="score-btn" id="lbtn-p1"'+(canScore?'':' disabled')+'>+1 '+m.team1.split(' ')[0]+'</button>'+
    '<button class="score-btn" id="lbtn-p2"'+(canScore?'':' disabled')+'>+1 '+m.team2.split(' ')[0]+'</button>'+
    '</div>'+
    '<div class="score-actions">'+
    '<button class="btn btn-secondary btn-sm" id="lbtn-undo"'+(canScore&&s.history.length?'':' disabled')+'>↩ Undo</button>'+
    '<button class="btn btn-secondary btn-sm" id="lbtn-exit">✕ Exit</button>'+
    (m.done&&!m.locked?'<button class="btn btn-danger btn-sm" id="lbtn-lock">🔒 Lock</button>':'')+
    '</div></div>';
  document.getElementById('lbtn-p1').addEventListener('click',function(){addPoint(1);});
  document.getElementById('lbtn-p2').addEventListener('click',function(){addPoint(2);});
  document.getElementById('lbtn-undo').addEventListener('click',undoPoint);
  document.getElementById('lbtn-exit').addEventListener('click',exitMatch);
  var lb=document.getElementById('lbtn-lock');if(lb)lb.addEventListener('click',lockMatch);
}

function addPoint(player){
  var m=currentMatch;if(!m||m.done)return;
  var winScore=WIN_AT[m.type],deuceAt=DEUCE_AT[m.type],s=m.currentSet;
  s.history.push({s1:s.s1,s2:s.s2});
  if(player===1)s.s1++;else s.s2++;
  var mx=Math.max(s.s1,s.s2),mn=Math.min(s.s1,s.s2);
  if(s.s1===deuceAt&&s.s2===deuceAt){saveMatch(m);renderLive();showOverlay('DEUCE!',m.team1+' vs '+m.team2,[{label:'Continue',fn:closeOverlay}],false);return;}
  if(mx>deuceAt&&mn>=deuceAt){
    if(mx-mn>=2){endSet(m);return;}
    saveMatch(m);renderLive();showOverlay('Advantage: '+(s.s1>s.s2?m.team1:m.team2).split(' ')[0],'Deuce in progress',[{label:'Continue',fn:closeOverlay}],false);return;
  }
  if(s.s1>=winScore||s.s2>=winScore){endSet(m);return;}
  saveMatch(m);renderLive();
}
function endSet(m){
  var s=m.currentSet,w=s.s1>s.s2?1:2;
  m.sets.push({s1:s.s1,s2:s.s2,winner:w});m.setWins[w-1]++;m.currentSet={s1:0,s2:0,history:[]};
  var isFinal=m.stage==='final';
  var setsToWin=isFinal?3:2;
  if(m.setWins[0]===setsToWin||m.setWins[1]===setsToWin){
    m.done=true;m.winner=m.setWins[0]===2?1:2;saveMatch(m);renderLive();
    showOverlay('🏆 '+(m.winner===1?m.team1:m.team2).split(' ')[0]+' Wins!','Sets: '+m.setWins[0]+'-'+m.setWins[1],
      [{label:'🔒 Lock Match',fn:lockMatch},{label:'Keep Editing',fn:closeOverlay}],true);return;
  }
  saveMatch(m);renderLive();showOverlay('Set Won!',(s.s1>s.s2?m.team1:m.team2).split(' ')[0]+' wins the set',[{label:'Next Set',fn:closeOverlay}],false);
}
function undoPoint(){
  var m=currentMatch;if(!m||!m.currentSet.history.length)return;
  var prev=m.currentSet.history.pop();m.currentSet.s1=prev.s1;m.currentSet.s2=prev.s2;
  saveMatch(m);renderLive();
}
function lockMatch(){
  closeOverlay();var m=currentMatch;if(!m)return;
  m.locked=true;saveMatch(m);currentMatch=null;
  showScoreSubview(scoreMode==='doubles'?'doubles':'singles');
}
function exitMatch(){
  if(currentMatch&&currentMatch.done){lockMatch();return;}
  if(confirm('Exit without saving?')){currentMatch=null;showScoreSubview(scoreMode==='doubles'?'doubles':'singles');}
}
function showOverlay(title,sub,actions,isWinner){
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-sub').textContent=sub;
  document.getElementById('overlay-box').className='overlay-box'+(isWinner?' winner-box':'');
  var el=document.getElementById('overlay-btns');el.innerHTML='';
  actions.forEach(function(a){var b=document.createElement('button');b.className='btn btn-primary';b.textContent=a.label;b.addEventListener('click',a.fn);el.appendChild(b);});
  document.getElementById('overlay').style.display='flex';
}
function closeOverlay(){document.getElementById('overlay').style.display='none';if(currentMatch)renderLive();}

[0,1,2,3,4].forEach(function(d){document.getElementById('df-'+d).addEventListener('click',function(){currentDayFilter=d;[0,1,2,3,4].forEach(function(x){document.getElementById('df-'+x).classList.toggle('active',x===d);});renderMatches();});});
function renderMatches(){
  var el=document.getElementById('matches-list');el.innerHTML='';
  var list=Object.values(matches).filter(function(m){return currentDayFilter===0||m.day===currentDayFilter;});
  list.sort(function(a,b){return b.id-a.id;});
  if(!list.length){el.innerHTML='<div class="empty">No matches found</div>';return;}
  list.forEach(function(m){
    var winner=m.done?(m.winner===1?m.team1:m.team2):null;
    var scores=m.sets.map(function(s){return s.s1+'-'+s.s2;}).join(', ');
    var sl=m.stage==='group'?'Group '+(m.group||''):m.stage==='league'?'League':m.stage==='semifinal'?'SF':m.stage==='knockout'?'KO':'Final';
    var item=document.createElement('div');item.className='match-item';
    item.innerHTML='<div class="match-teams">'+m.team1+'<span class="vs">vs</span>'+m.team2+'</div>'+
      '<div class="match-meta"><span class="dot '+(m.done?'dot-done':m.sets.length?'dot-live':'dot-up')+'"></span>'+(m.type==='singles'?'Singles':'Doubles')+' · '+sl+' · Day '+m.day+'</div>'+
      (m.done?'<div class="match-result">🏆 '+winner+' won · '+scores+'</div>':'<div class="match-result ongoing">In progress · '+(scores||'Not started')+'</div>');
    if(m.locked){var btn=document.createElement('button');btn.textContent='✏️ Edit (Admin)';btn.className='btn btn-secondary btn-sm';btn.style.marginTop='8px';(function(id){btn.addEventListener('click',function(){adminEdit(id);});})(m.id);item.appendChild(btn);}
    el.appendChild(item);
  });
}

['singlesA','singlesB','doubles'].forEach(function(t){document.getElementById('tab-'+t).addEventListener('click',function(){showStandingsTab(t);});});
function showStandingsTab(tab){
  currentStandingsTab=tab;
  ['singlesA','singlesB','doubles'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('active',t===tab);});
  var type=tab==='doubles'?'doubles':'singles';
  var group=tab==='singlesA'?'A':tab==='singlesB'?'B':null;
  var title=tab==='singlesA'?'Singles — Group A':tab==='singlesB'?'Singles — Group B':'Doubles — League';
  var rows=getStandings(type,group);
  var el=document.getElementById('standings-content');
  var html='<div class="card-title">'+title+'</div>';
  if(!rows.length){el.innerHTML=html+'<div class="empty">No completed matches yet</div>';return;}
  html+='<table class="pt-table"><tr><th>Team</th><th>MP</th><th>W</th><th>L</th><th>SW</th><th>SL</th><th>SD</th><th>PF</th><th>PA</th><th>Pts</th></tr>'+
    rows.map(function(p,i){return '<tr><td><span class="rank-badge '+(i===0?'r1':i===1?'r2':i===2?'r3':'')+'">'+(i+1)+'</span>'+p.name+'</td><td>'+p.mp+'</td><td>'+p.mw+'</td><td>'+p.ml+'</td><td>'+p.sw+'</td><td>'+p.sl+'</td><td>'+(p.sw-p.sl)+'</td><td>'+p.pf+'</td><td>'+p.pa+'</td><td><strong>'+p.pts+'</strong></td></tr>';}).join('')+'</table>';
  if(tab==='doubles') html+=buildKOSection(rows);
  if(tab==='singlesA'||tab==='singlesB') html+=buildSinglesKOSection(getStandings('singles','A'),getStandings('singles','B'));
  el.innerHTML=html;
}
function buildKOSection(s){
  var sf1w=getKOWinner(KO_FIDS.dSF1),sf2w=getKOWinner(KO_FIDS.dSF2),fw=getKOWinner(KO_FIDS.dFinal);
  return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:4px">'+
    '<div class="card-title" style="padding-top:8px">Knockouts</div>'+
    '<div style="font-size:12px;color:#7a9cc4;margin-bottom:6px">Semi Finals</div>'+
    koRow('SF1',s[0]?s[0].name:'TBD',s[3]?s[3].name:'TBD',sf1w)+
    koRow('SF2',s[1]?s[1].name:'TBD',s[2]?s[2].name:'TBD',sf2w)+
    '<div style="font-size:12px;color:#7a9cc4;margin-top:8px;margin-bottom:6px">Final</div>'+
    koRow('Final',sf1w||'TBD',sf2w||'TBD',fw)+'</div>';
}
function buildSinglesKOSection(rowsA,rowsB){
  var sf1w=getKOWinner(KO_FIDS.sSF1),sf2w=getKOWinner(KO_FIDS.sSF2),fw=getKOWinner(KO_FIDS.sFinal);
  return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:4px">'+
    '<div class="card-title" style="padding-top:8px">Singles Knockouts</div>'+
    '<div style="font-size:12px;color:#7a9cc4;margin-bottom:6px">Semi Finals</div>'+
    koRow('SF1',rowsA[0]?rowsA[0].name:'TBD (A 1st)',rowsB[1]?rowsB[1].name:'TBD (B 2nd)',sf1w)+
    koRow('SF2',rowsA[1]?rowsA[1].name:'TBD (A 2nd)',rowsB[0]?rowsB[0].name:'TBD (B 1st)',sf2w)+
    '<div style="font-size:12px;color:#7a9cc4;margin-top:8px;margin-bottom:6px">Final</div>'+
    koRow('Final',sf1w||'TBD',sf2w||'TBD',fw)+'</div>';
}
function koRow(label,t1,t2,winner){
  return '<div style="padding:8px 0;border-bottom:1px solid #0f1b2d;font-size:13px">'+
    '<span style="color:#ce93d8;font-size:10px;font-weight:700;margin-right:6px">'+label+'</span>'+
    '<span style="font-weight:600">'+t1+'</span><span class="vs">vs</span><span style="font-weight:600">'+t2+'</span>'+
    (winner?'<div style="font-size:12px;color:#66bb6a;margin-top:2px">🏆 '+winner+' won</div>':'')+
    '</div>';
}

// ---- HOME ----
function renderHome(){
  var total=Object.values(matches).filter(function(m){return m.done&&m.locked;}).length;
  var live=Object.values(matches).filter(function(m){return !m.done&&m.sets&&m.sets.length>0;}).length;
  var todayM=Object.values(matches).filter(function(m){return m.day===singlesDay;});
  document.getElementById('header-day').textContent='Day '+singlesDay+' of 4';
  document.getElementById('home-content').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px">'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#4fc3f7">'+total+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">Completed</div></div>'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#ff7043">'+live+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">In Progress</div></div>'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#ffd54f">'+singlesDay+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">Today (Day)</div></div>'+
    '</div><div class="card"><div class="card-title">Matches Today (Day '+singlesDay+')</div>'+
    (todayM.length===0?'<div class="empty">No matches today yet</div>':
    todayM.map(function(m){
      var winner=m.done?(m.winner===1?m.team1:m.team2):null;
      var sl=m.stage==='group'?'Group '+(m.group||''):m.stage==='league'?'League':m.stage==='semifinal'?'SF':'Final';
      return '<div class="match-item"><div class="match-teams">'+m.team1+'<span class="vs">vs</span>'+m.team2+'</div>'+
        '<div class="match-meta"><span class="dot '+(m.done?'dot-done':'dot-live')+'"></span>'+(m.type==='singles'?'Singles':'Doubles')+' · '+sl+'</div>'+
        (m.done?'<div class="match-result">🏆 '+winner+' won</div>':'<div class="match-result ongoing">In progress</div>')+'</div>';
    }).join(''))+
    '</div>';
}
renderHome();
</script>
</body>
</html>
