<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TT Tournament">
<title>TT Tournament 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;text-size-adjust:100%}
html{touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1b2d;color:#e8edf5;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.nav{display:flex;background:#162236;border-bottom:1px solid #1e3a5f;position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:12px 2px;font-size:11px;font-weight:600;color:#7a9cc4;background:none;border:none;cursor:pointer;text-transform:uppercase;border-bottom:3px solid transparent;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:#4fc3f7;border-bottom-color:#4fc3f7}
.header{background:#1565c0;padding:16px 16px 12px;text-align:center}
.header h1{font-size:20px;font-weight:700;color:#fff}
.header p{font-size:12px;color:#90caf9;margin-top:3px}
.card{background:#162236;border-radius:12px;margin:12px 12px 0;padding:16px;border:1px solid #1e3a5f}
.card-title{font-size:12px;font-weight:700;color:#4fc3f7;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#1976d2;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-secondary{background:#1e3a5f;color:#90caf9;border:1px solid #2a5080}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;margin-top:8px;display:block}
.btn:disabled{opacity:.4;cursor:not-allowed}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#7a9cc4;font-weight:600;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 12px;background:#0f1b2d;border:1px solid #2a5080;border-radius:8px;color:#e8edf5;font-size:14px;outline:none}
.toggle-group{display:flex;background:#0f1b2d;border-radius:8px;border:1px solid #2a5080;overflow:hidden}
.toggle-btn{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;background:none;color:#7a9cc4;cursor:pointer;-webkit-tap-highlight-color:transparent}
.toggle-btn.active{background:#1976d2;color:#fff}
.scoreboard{background:#0a1525;border-radius:12px;overflow:hidden;margin:12px 12px 0}
.score-header{background:#162236;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3a5f}
.match-info{font-size:11px;color:#7a9cc4}
.set-info{font-size:12px;font-weight:700;color:#ffd54f}
.teams-row{display:flex}
.team-col{flex:1;padding:16px 12px;text-align:center}
.team-col.left{border-right:1px solid #1e3a5f}
.team-name{font-size:13px;font-weight:700;color:#90caf9;margin-bottom:4px;word-break:break-word}
.team-score{font-size:52px;font-weight:800;line-height:1;color:#fff}
.team-score.winning{color:#66bb6a}
.team-sets{font-size:12px;color:#7a9cc4;margin-top:4px}
.score-btns{display:flex}
.score-btn{flex:1;padding:22px 8px;font-size:16px;font-weight:700;border:none;cursor:pointer;background:#1565c0;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.score-btn:first-child{border-right:1px solid #0d47a1}
.score-btn:active{background:#0d47a1}
.score-btn:disabled{opacity:.3;cursor:not-allowed;background:#1e3a5f}
.score-actions{display:flex;gap:8px;padding:10px 12px;background:#162236;border-top:1px solid #1e3a5f;flex-wrap:wrap}
.sets-row{display:flex;padding:8px 12px;background:#0d1e30;gap:4px;flex-wrap:wrap;min-height:34px}
.set-badge{font-size:11px;padding:4px 8px;border-radius:4px;font-weight:600}
.set-win{background:#1b5e20;color:#a5d6a7}
.set-lose{background:#4a1010;color:#ef9a9a}
.set-ongoing{background:#1a2a40;color:#7a9cc4}
.pt-table{width:100%;border-collapse:collapse;font-size:12px}
.pt-table th{padding:7px 4px;color:#7a9cc4;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #1e3a5f;text-align:center}
.pt-table th:first-child{text-align:left}
.pt-table td{padding:7px 4px;border-bottom:1px solid #0f1b2d;text-align:center}
.pt-table td:first-child{text-align:left;font-weight:600;font-size:11px}
.pt-table tr:last-child td{border-bottom:none}
.rank-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;line-height:18px;text-align:center;margin-right:3px}
.r1{background:#f57c00;color:#fff}.r2{background:#455a64;color:#fff}.r3{background:#4a2900;color:#ff8f00}
.match-item{padding:12px;border-bottom:1px solid #1e3a5f}
.match-item:last-child{border-bottom:none}
.match-teams{font-size:14px;font-weight:600;color:#e8edf5}
.vs{color:#f57c00;margin:0 5px;font-size:11px}
.match-meta{font-size:12px;color:#7a9cc4;margin-top:3px}
.match-result{font-size:13px;font-weight:700;color:#66bb6a;margin-top:3px}
.match-result.ongoing{color:#ffd54f}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot-done{background:#66bb6a}.dot-live{background:#ff7043}.dot-up{background:#455a64}
.page{display:none}.page.active{display:block}
.group-tab-row{display:flex;gap:6px;padding:0 12px;margin-top:12px;flex-wrap:wrap}
.group-tab{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:#1e3a5f;color:#7a9cc4;border:none;-webkit-tap-highlight-color:transparent}
.group-tab.active{background:#1976d2;color:#fff}
.day-row{display:flex;gap:6px;padding:0 12px;margin-top:12px;flex-wrap:wrap}
.day-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:#1e3a5f;color:#7a9cc4;border:none;-webkit-tap-highlight-color:transparent}
.day-btn.active{background:#1565c0;color:#fff}
.empty{text-align:center;padding:32px 16px;color:#455a64;font-size:14px}
.conn-bar{text-align:center;padding:6px;font-size:12px;font-weight:600}
.conn-ok{background:#1b5e20;color:#a5d6a7}
.conn-err{background:#4a1010;color:#ef9a9a}
.conn-wait{background:#1a2a40;color:#7a9cc4}
.fixture-item{padding:12px;border-bottom:1px solid #1e3a5f;display:flex;justify-content:space-between;align-items:center;gap:8px}
.fixture-item:last-child{border-bottom:none}
.fixture-teams{font-size:13px;font-weight:600;color:#e8edf5;flex:1}
.fixture-day{font-size:11px;color:#7a9cc4;margin-top:2px}
.fix-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap}
.fix-done{background:#1b5e20;color:#a5d6a7}.fix-live{background:#4a2000;color:#ff8f00}.fix-pending{background:#1a2a40;color:#7a9cc4}.fix-locked{background:#1a0a30;color:#ce93d8}
.ko-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#4a1a6a;color:#ce93d8;margin-left:6px;vertical-align:middle}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal{background:#162236;border-radius:16px;padding:24px;width:100%;max-width:300px;border:1px solid #2a5080}
.modal h3{font-size:16px;font-weight:700;color:#e8edf5;margin-bottom:6px}
.modal p{font-size:13px;color:#7a9cc4;margin-bottom:14px}
.modal input{width:100%;padding:12px;background:#0f1b2d;border:1px solid #2a5080;border-radius:8px;color:#e8edf5;font-size:20px;letter-spacing:6px;text-align:center;outline:none;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.modal-cancel{background:#1e3a5f;color:#90caf9}.modal-confirm{background:#1976d2;color:#fff}
.modal-err{font-size:12px;color:#ef5350;margin-top:-6px;margin-bottom:8px;min-height:18px}
.ov-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.ov-box{background:#162236;border-radius:16px;padding:28px 24px;text-align:center;max-width:320px;width:100%;border:2px solid #f57c00}
.ov-box.winner{border-color:#ffd54f}
.ov-title{font-size:26px;font-weight:800;margin-bottom:8px}
.ov-sub{font-size:14px;color:#90caf9}
.ov-btns{margin-top:20px;display:flex;gap:8px;flex-direction:column}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #4fc3f7;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="conn-bar" class="conn-bar conn-wait"><span class="spinner"></span>Connecting...</div>
<div class="app">
  <div class="header"><h1>🏓 TT Tournament 2026</h1><p id="header-day">Day 1 of 4</p></div>
  <div class="nav">
    <button class="nav-btn active" id="nav-home">Home</button>
    <button class="nav-btn" id="nav-score">Scoring</button>
    <button class="nav-btn" id="nav-table">Standings</button>
    <button class="nav-btn" id="nav-matches">Matches</button>
  </div>

  <div id="page-home" class="page active"><div id="home-content"><div class="empty">Loading...</div></div></div>

  <div id="page-score" class="page">
    <div class="card">
      <div class="card-title">Match Type</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="tab-s">Singles</button>
        <button class="toggle-btn" id="tab-d">Doubles</button>
      </div>
    </div>
    <!-- Singles -->
    <div id="pane-singles">
      <div class="card" style="margin-top:10px">
        <div class="card-title">Singles — Pick Fixture</div>
        <div class="form-group">
          <label class="form-label">Stage</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="ss-group">Group</button>
            <button class="toggle-btn" id="ss-sf">Semi Final</button>
            <button class="toggle-btn" id="ss-final">Final</button>
          </div>
        </div>
        <div id="s-group-opts">
          <div class="form-group">
            <label class="form-label">Group</label>
            <div class="toggle-group">
              <button class="toggle-btn active" id="sg-a">Group A</button>
              <button class="toggle-btn" id="sg-b">Group B</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Day</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="sd-1">1</button>
            <button class="toggle-btn" id="sd-2">2</button>
            <button class="toggle-btn" id="sd-3">3</button>
            <button class="toggle-btn" id="sd-4">4</button>
          </div>
        </div>
      </div>
      <div class="card" style="margin-top:10px" id="singles-fix-list"></div>
    </div>
    <!-- Doubles -->
    <div id="pane-doubles" style="display:none">
      <div class="card" style="margin-top:10px">
        <div class="card-title">Doubles — Pick Fixture</div>
        <div class="form-group">
          <label class="form-label">Day</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="dd-1">1</button>
            <button class="toggle-btn" id="dd-2">2</button>
            <button class="toggle-btn" id="dd-3">3</button>
            <button class="toggle-btn" id="dd-4">4</button>
          </div>
        </div>
      </div>
      <div class="card" style="margin-top:10px" id="doubles-fix-list"></div>
    </div>
    <!-- Live -->
    <div id="pane-live" style="display:none"></div>
  </div>

  <div id="page-table" class="page">
    <div class="group-tab-row">
      <button class="group-tab active" id="tab-sA">Singles A</button>
      <button class="group-tab" id="tab-sB">Singles B</button>
      <button class="group-tab" id="tab-dbl">Doubles</button>
    </div>
    <div id="standings-content" class="card" style="margin-top:10px"></div>
  </div>

  <div id="page-matches" class="page">
    <div class="day-row">
      <button class="day-btn active" id="df-0">All</button>
      <button class="day-btn" id="df-1">Day 1</button>
      <button class="day-btn" id="df-2">Day 2</button>
      <button class="day-btn" id="df-3">Day 3</button>
      <button class="day-btn" id="df-4">Day 4</button>
    </div>
    <div id="matches-list" class="card" style="margin-top:10px"></div>
    <div style="margin:12px 12px 0">
      <button class="btn btn-danger btn-full" id="reset-btn">🗑️ Reset All Data (Admin)</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="pin-modal" style="display:none">
  <div class="modal">
    <h3>Admin Access</h3>
    <p id="pin-msg">Enter PIN</p>
    <input type="password" id="pin-input" maxlength="10" placeholder="••••">
    <div class="modal-err" id="pin-err"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="pin-cancel">Cancel</button>
      <button class="modal-confirm" id="pin-ok">Confirm</button>
    </div>
  </div>
</div>

<div class="ov-wrap" id="ov" style="display:none">
  <div class="ov-box" id="ov-box">
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-sub" id="ov-sub"></div>
    <div class="ov-btns" id="ov-btns"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ============================================================
// CONSTANTS
// ============================================================
var PIN = '2725';
var WIN = {singles:11, doubles:21};
var DEUCE = {singles:10, doubles:20};

var DFIXTURES = [
  {fid:'d01',t1:'Abhijit & Rishav',t2:'Raj & Nikunj'},

  {fid:'d07',t1:'Raj & Nikunj',t2:'Yogesh & Subrata'},
  {fid:'d08',t1:'Raj & Nikunj',t2:'Swarnim & HN Chatterjee'},
  {fid:'d09',t1:'Raj & Nikunj',t2:'Saif & Atibur'},
  {fid:'d10',t1:'Rahul & Arnav',t2:'Yogesh & Subrata'},
  {fid:'d11',t1:'Rahul & Arnav',t2:'Swarnim & HN Chatterjee'},
  {fid:'d12',t1:'Rahul & Arnav',t2:'Saif & Atibur'},
  {fid:'d13',t1:'Yogesh & Subrata',t2:'Swarnim & HN Chatterjee'},
  {fid:'d14',t1:'Yogesh & Subrata',t2:'Saif & Atibur'},
  {fid:'d15',t1:'Swarnim & HN Chatterjee',t2:'Saif & Atibur'},
];
var SA_FIXTURES = [
  {fid:'sA01',t1:'Rahul',t2:'Abhijit'},{fid:'sA02',t1:'Rahul',t2:'Raj'},
  {fid:'sA03',t1:'Rahul',t2:'Arnav'},{fid:'sA04',t1:'Rahul',t2:'Atibur'},
  {fid:'sA05',t1:'Rahul',t2:'Chatterjee'},{fid:'sA06',t1:'Abhijit',t2:'Raj'},
  {fid:'sA07',t1:'Abhijit',t2:'Arnav'},{fid:'sA08',t1:'Abhijit',t2:'Atibur'},
  {fid:'sA09',t1:'Abhijit',t2:'Chatterjee'},{fid:'sA10',t1:'Raj',t2:'Arnav'},
  {fid:'sA11',t1:'Raj',t2:'Atibur'},{fid:'sA12',t1:'Raj',t2:'Chatterjee'},
  {fid:'sA13',t1:'Arnav',t2:'Atibur'},{fid:'sA14',t1:'Arnav',t2:'Chatterjee'},
  {fid:'sA15',t1:'Atibur',t2:'Chatterjee'},
];
var SB_FIXTURES = [
  {fid:'sB01',t1:'Swarnim',t2:'Yogesh'},{fid:'sB02',t1:'Swarnim',t2:'Rishabh'},
  {fid:'sB03',t1:'Swarnim',t2:'Nikunj'},{fid:'sB04',t1:'Swarnim',t2:'Saif'},
  {fid:'sB05',t1:'Swarnim',t2:'Subrata'},{fid:'sB06',t1:'Yogesh',t2:'Rishabh'},
  {fid:'sB07',t1:'Yogesh',t2:'Nikunj'},{fid:'sB08',t1:'Yogesh',t2:'Saif'},
  {fid:'sB09',t1:'Yogesh',t2:'Subrata'},{fid:'sB10',t1:'Rishabh',t2:'Nikunj'},

  {fid:'sB13',t1:'Nikunj',t2:'Saif'},{fid:'sB14',t1:'Nikunj',t2:'Subrata'},
  {fid:'sB15',t1:'Saif',t2:'Subrata'},
];

// ============================================================
// STATE — never modified by Firebase listener
// ============================================================
var matches = {};       // mirror of Firebase, read-only from UI perspective
var liveMatch = null;   // the one match being scored RIGHT NOW — Firebase never touches this
var sMode = 'singles';  // 'singles' | 'doubles'
var sStage = 'group';   // 'group' | 'semifinal' | 'final'
var sGroup = 'A';
var sDay = 1;
var dDay = 1;
var dayFilter = 0;
var standTab = 'singlesA';
var pendingPin = null;  // {action, matchId}

// ============================================================
// FIREBASE
// ============================================================
firebase.initializeApp({
  apiKey:"AIzaSyBE5M0wLDaiY5zMk8fioZzOMk2tDzZO0gg",
  authDomain:"tt-tournament-2026.firebaseapp.com",
  databaseURL:"https://tt-tournament-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"tt-tournament-2026",
  storageBucket:"tt-tournament-2026.firebasestorage.app",
  messagingSenderId:"953586518356",
  appId:"1:953586518356:web:05b88de06538a2546ca0c1"
});
var db = firebase.database();

function fbSet(m){ db.ref('matches/'+m.id).set(JSON.parse(JSON.stringify(m))); }
function fbDel(){ db.ref('matches').remove(); }

db.ref('.info/connected').on('value',function(s){
  var b=document.getElementById('conn-bar');
  if(s.val()){b.className='conn-bar conn-ok';b.textContent='🟢 Live — all devices in sync';}
  else{b.className='conn-bar conn-err';b.textContent='🔴 Offline — reconnecting...';}
});

// Firebase listener — ONLY updates non-scoring UI
db.ref('matches').on('value',function(snap){
  matches = snap.val()||{};
  // If there's a live match in Firebase and we don't have one loaded, restore it
  if(!liveMatch){
    var live=Object.values(matches).find(function(m){ return !m.done && !m.locked && m.sets && m.sets.length>0; });
    if(live) liveMatch=JSON.parse(JSON.stringify(live));
  }
  // Never touch pane-live or liveMatch — only refresh passive views
  var ap = document.querySelector('.page.active');
  if(!ap) return;
  var pid = ap.id.replace('page-','');
  if(pid==='home') renderHome();
  if(pid==='table') renderStandings(standTab);
  if(pid==='matches') renderMatches();
  // Refresh fixture lists only if live pane is hidden
  if(pid==='score' && isLiveHidden()){
    if(sMode==='singles') renderSFixtures();
    if(sMode==='doubles') renderDFixtures();
  }
});

function isLiveHidden(){ return document.getElementById('pane-live').style.display==='none'; }

// ============================================================
// NAVIGATION
// ============================================================
['home','score','table','matches'].forEach(function(id){
  document.getElementById('nav-'+id).addEventListener('click',function(){ goTo(id); });
});

function goTo(p){
  ['home','score','table','matches'].forEach(function(id){
    document.getElementById('page-'+id).classList.remove('active');
    document.getElementById('nav-'+id).classList.remove('active');
  });
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='home') renderHome();
  if(p==='score'){
    if(isLiveHidden()){
      // Check if there's an unfinished match in Firebase — auto-resume it
      var inProgress=Object.values(matches).find(function(m){ return !m.locked; });
      if(inProgress){
        liveMatch=JSON.parse(JSON.stringify(inProgress));
        if(!liveMatch.cs) liveMatch.cs={s1:0,s2:0,hist:[]};
        if(!liveMatch.sw) liveMatch.sw=[0,0];
        if(!liveMatch.sets) liveMatch.sets=[];
        sMode=liveMatch.type;
        document.getElementById('tab-s').classList.toggle('active',liveMatch.type==='singles');
        document.getElementById('tab-d').classList.toggle('active',liveMatch.type==='doubles');
        showPane('live');
        renderLive();
        return;
      }
      if(sMode==='doubles'){
        document.getElementById('tab-d').classList.add('active');
        document.getElementById('tab-s').classList.remove('active');
        showPane('doubles');
      } else {
        document.getElementById('tab-s').classList.add('active');

function startMatch(fid,existing,t1,t2,type,stage){
  var day = type==='singles'?sDay:dDay;
  var group = (type==='singles'&&stage==='group')?sGroup:null;
  var m = existing ? JSON.parse(JSON.stringify(existing)) : {
    id: Date.now(), fid:fid, type:type, stage:stage, group:group, day:day,
    t1:t1, t2:t2, sets:[], cs:{s1:0,s2:0,hist:[]}, sw:[0,0], done:false, w:null, locked:false
  };
  // Ensure cs exists (old matches may not have it)
  if(!m.cs) m.cs={s1:0,s2:0,hist:[]};
  if(!m.sw) m.sw=[0,0];
  if(!m.sets) m.sets=[];
  liveMatch = m;
  sMode = type;
  if(!existing) fbSet(m);
  // Make sure score tab and correct pane type is active
  document.getElementById('tab-s').classList.toggle('active', type==='singles');
  document.getElementById('tab-d').classList.toggle('active', type==='doubles');
  showPane('live');
  renderLive();
}

// ============================================================
// LIVE SCORING — completely isolated, never touched by Firebase
// ============================================================
function renderLive(){
  var m=liveMatch; if(!m) return;
  var el=document.getElementById('pane-live');
  var s=m.cs, setNum=m.sets.length+1;
  var canScore=!m.done&&!m.locked;
  var isFinal=m.stage==='final';
  var maxSets=isFinal?5:3;
  var setsNeeded=isFinal?3:2;
  var w1=s.s1>s.s2, w2=s.s2>s.s1;
  var sl=m.stage==='group'?'Group '+(m.group||''):m.stage==='league'?'League':m.stage==='semifinal'?'Semi Final':'Final'+(isFinal?' (Best of 5)':'');

  var sh='';
  m.sets.forEach(function(st,i){
    sh+='<span class="set-badge '+(st.w===1?'set-win':'set-lose')+'">S'+(i+1)+': '+st.s1+'-'+st.s2+'</span> ';
  });
  if(!m.done) sh+='<span class="set-badge set-ongoing">S'+setNum+': '+s.s1+'-'+s.s2+'</span>';

  el.innerHTML=
    '<div class="scoreboard">'+
    '<div class="score-header">'+
      '<span class="match-info">'+(m.type==='singles'?'Singles':'Doubles')+' · '+sl+' · Day '+m.day+'</span>'+
      '<span class="set-info">'+(m.done?'Match Over':'Set '+setNum+' of '+maxSets)+'</span>'+
    '</div>'+
    '<div class="sets-row">'+(sh||'<span style="color:#455a64;font-size:12px">No sets yet</span>')+'</div>'+
    '<div class="teams-row">'+
      '<div class="team-col left"><div class="team-name">'+m.t1+'</div><div class="team-score'+(w1?' winning':'')+'">'+s.s1+'</div><div class="team-sets">Sets: '+m.sw[0]+'</div></div>'+
      '<div class="team-col"><div class="team-name">'+m.t2+'</div><div class="team-score'+(w2?' winning':'')+'">'+s.s2+'</div><div class="team-sets">Sets: '+m.sw[1]+'</div></div>'+
    '</div>'+
    '<div class="score-btns">'+
      '<button id="lp1" class="score-btn"'+(canScore?'':' disabled')+'>+1 '+m.t1.split(' ')[0]+'</button>'+
      '<button id="lp2" class="score-btn"'+(canScore?'':' disabled')+'>+1 '+m.t2.split(' ')[0]+'</button>'+
    '</div>'+
    '<div class="score-actions">'+
      '<button id="l-undo" class="btn btn-secondary btn-sm"'+(canScore&&s.hist.length?'':' disabled')+'>↩ Undo</button>'+
      '<button id="l-exit" class="btn btn-secondary btn-sm">✕ Exit</button>'+
      (m.done&&!m.locked?'<button id="l-lock" class="btn btn-danger btn-sm">🔒 Lock</button>':'')+
    '</div>'+
    '</div>';

  // Attach events fresh every render — this is safe because innerHTML replaces the DOM
  document.getElementById('lp1').addEventListener('click', function(e){ e.preventDefault(); addPt(1); });
  document.getElementById('lp2').addEventListener('click', function(e){ e.preventDefault(); addPt(2); });
  document.getElementById('l-undo').addEventListener('click', undoPt);
  document.getElementById('l-exit').addEventListener('click', exitMatch);
  var lb=document.getElementById('l-lock'); if(lb) lb.addEventListener('click', lockMatch);
}

function addPt(p){
  var m=liveMatch; if(!m||m.done||m.locked) return;
  var ws=WIN[m.type], da=DEUCE[m.type], s=m.cs;
  s.hist.push({s1:s.s1,s2:s.s2});
  if(p===1) s.s1++; else s.s2++;
  var mx=Math.max(s.s1,s.s2), mn=Math.min(s.s1,s.s2);

  // Deuce zone
  if(s.s1===da&&s.s2===da){
    fbSet(m); renderLive();
    showOv('DEUCE!',m.t1+' vs '+m.t2,[{txt:'Continue',fn:closeOv}],false); return;
  }
  if(mx>da&&mn>=da){
    if(mx-mn>=2){ endSet(m); return; }
    if(mx===mn){
      // Scores levelled after advantage = deuce again
      fbSet(m); renderLive();
      showOv('DEUCE!',m.t1+' vs '+m.t2,[{txt:'Continue',fn:closeOv}],false);
    } else {
      var leader=(s.s1>s.s2?m.t1:m.t2).split(' ')[0];
      fbSet(m); renderLive();
      showOv('Advantage: '+leader,'One point from winning the set',[{txt:'Continue',fn:closeOv}],false);
    }
    return;
  }

  if(s.s1>=ws||s.s2>=ws){ endSet(m); return; }
  fbSet(m); renderLive();
}

function endSet(m){
  var s=m.cs, w=s.s1>s.s2?1:2;
  m.sets.push({s1:s.s1,s2:s.s2,w:w}); m.sw[w-1]++; m.cs={s1:0,s2:0,hist:[]};
  var need=m.stage==='final'?3:2;
  if(m.sw[0]===need||m.sw[1]===need){
    m.done=true; m.w=m.sw[0]===need?1:2;
    fbSet(m); renderLive();
    var wn=(m.w===1?m.t1:m.t2).split(' ')[0];
    showOv('🏆 '+wn+' Wins!','Sets: '+m.sw[0]+'-'+m.sw[1],
      [{txt:'🔒 Lock Match',fn:lockMatch},{txt:'Keep Editing',fn:closeOv}],true);
    return;
  }
  fbSet(m); renderLive();
  showOv('Set Won!',(s.s1>s.s2?m.t1:m.t2).split(' ')[0]+' wins the set',[{txt:'Next Set',fn:closeOv}],false);
}

function undoPt(){
  var m=liveMatch; if(!m||!m.cs.hist.length) return;
  var prev=m.cs.hist.pop(); m.cs.s1=prev.s1; m.cs.s2=prev.s2;
  fbSet(m); renderLive();
}

function lockMatch(){
  closeOv(); var m=liveMatch; if(!m) return;
  m.locked=true; fbSet(m); liveMatch=null;
  sMode==='doubles'?showPane('doubles'):showPane('singles');
}

function exitMatch(){
  if(liveMatch&&liveMatch.done){ lockMatch(); return; }
  if(confirm('Exit without saving?')){ liveMatch=null; sMode==='doubles'?showPane('doubles'):showPane('singles'); }
}

// STANDINGS
// ============================================================
function getStandings(type,group){
  var rel=Object.values(matches).filter(function(m){
    var isLeague=(m.stage==='group'||m.stage==='league');
    return m.done&&m.locked&&m.type===type&&isLeague&&(type==='doubles'||m.group===group);
  });
  var p={};
  rel.forEach(function(m){
    [m.t1,m.t2].forEach(function(t){ if(!p[t]) p[t]={name:t,mp:0,mw:0,ml:0,pts:0,sw:0,sl:0,pf:0,pa:0}; });
    p[m.t1].mp++; p[m.t2].mp++;
    var w=m.w===1?m.t1:m.t2, l=m.w===1?m.t2:m.t1;
    p[w].mw++; p[w].pts+=3; p[l].ml++;
    m.sets.forEach(function(s){
      p[m.t1].pf+=s.s1; p[m.t1].pa+=s.s2; p[m.t2].pf+=s.s2; p[m.t2].pa+=s.s1;
      if(s.w===1){p[m.t1].sw++;p[m.t2].sl++;}else{p[m.t2].sw++;p[m.t1].sl++;}
    });
  });
  return Object.values(p).sort(function(a,b){
    if(b.pts!==a.pts) return b.pts-a.pts;
    var sd=(b.sw-b.sl)-(a.sw-a.sl); if(sd!==0) return sd;
    return (b.pf-b.pa)-(a.pf-a.pa);
  });
}

['sA','sB','dbl'].forEach(function(t){ document.getElementById('tab-'+t).addEventListener('click',function(){ renderStandings(t==='sA'?'singlesA':t==='sB'?'singlesB':'doubles'); }); });

  standTab=tab;

  var type=tab==='doubles'?'doubles':'singles';
  var group=tab==='singlesA'?'A':tab==='singlesB'?'B':null;
  var title=tab==='singlesA'?'Singles — Group A':tab==='singlesB'?'Singles — Group B':'Doubles — League';
  var rows=getStandings(type,group);
  var el=document.getElementById('standings-content');
  var html='<div class="card-title">'+title+'</div>';
  if(!rows.length){ el.innerHTML=html+'<div class="empty">No completed matches yet</div>'; return; }
  html+='<div style="overflow-x:auto"><table class="pt-table"><tr><th>Team</th><th>MP</th><th>W</th><th>L</th><th>SW</th><th>SL</th><th>SD</th><th>PF</th><th>PA</th><th>Pts</th></tr>'+
    rows.map(function(p,i){ return '<tr><td><span class="rank-badge '+(i===0?'r1':i===1?'r2':i===2?'r3':'')+'">'+(i+1)+'</span>'+p.name+'</td><td>'+p.mp+'</td><td>'+p.mw+'</td><td>'+p.ml+'</td><td>'+p.sw+'</td><td>'+p.sl+'</td><td>'+(p.sw-p.sl)+'</td><td>'+p.pf+'</td><td>'+p.pa+'</td><td><strong>'+p.pts+'</strong></td></tr>'; }).join('')+'</table></div>';
  if(tab==='doubles') html+=buildDblKO(rows);
  if(tab==='singlesA'||tab==='singlesB') html+=buildSglKO(getStandings('singles','A'),getStandings('singles','B'));
  el.innerHTML=html;
}

function buildDblKO(s){
  var done=s.length===6&&s.every(function(t){return t.mp===5;});
  if(!done) return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:12px"><div class="card-title">Knockouts</div><div style="font-size:13px;color:#455a64;padding:8px 0">Complete all 15 league matches to unlock knockouts.</div></div>';
  var w1=koWinner(KO.dSF1),w2=koWinner(KO.dSF2),fw=koWinner(KO.dFinal);
  return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:4px"><div class="card-title" style="padding-top:8px">Knockouts</div>'+
    '<div style="font-size:12px;color:#7a9cc4;margin-bottom:6px">Semi Finals</div>'+
    koRow('SF1',s[0].name,s[3].name,w1)+koRow('SF2',s[1].name,s[2].name,w2)+
    '<div style="font-size:12px;color:#7a9cc4;margin-top:8px;margin-bottom:6px">Final</div>'+
    koRow('Final',w1||'TBD',w2||'TBD',fw)+'</div>';
}
function buildSglKO(rA,rB){
  var doneA=rA.length===6&&rA.every(function(t){return t.mp===5;});
  var doneB=rB.length===6&&rB.every(function(t){return t.mp===5;});
  if(!doneA||!doneB) return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:12px"><div class="card-title">Singles Knockouts</div><div style="font-size:13px;color:#455a64;padding:8px 0">Complete all group stage matches to unlock knockouts.</div></div>';
  var w1=koWinner(KO.sSF1),w2=koWinner(KO.sSF2),fw=koWinner(KO.sFinal);
  return '<div style="border-top:1px solid #1e3a5f;margin-top:12px;padding-top:4px"><div class="card-title" style="padding-top:8px">Singles Knockouts</div>'+
    '<div style="font-size:12px;color:#7a9cc4;margin-bottom:6px">Semi Finals</div>'+
    koRow('SF1',rA[0].name,rB[1].name,w1)+koRow('SF2',rA[1].name,rB[0].name,w2)+
    '<div style="font-size:12px;color:#7a9cc4;margin-top:8px;margin-bottom:6px">Final</div>'+
    koRow('Final',w1||'TBD',w2||'TBD',fw)+'</div>';
}
function koRow(lbl,t1,t2,winner){
  return '<div style="padding:8px 0;border-bottom:1px solid #0f1b2d;font-size:13px">'+
    '<span style="color:#ce93d8;font-size:10px;font-weight:700;margin-right:6px">'+lbl+'</span>'+
    '<span style="font-weight:600">'+t1+'</span><span class="vs">vs</span><span style="font-weight:600">'+t2+'</span>'+
    (winner?'<div style="font-size:12px;color:#66bb6a;margin-top:2px">🏆 '+winner+' won</div>':'')+
    '</div>';
}

// ============================================================
// HOME
// ============================================================
function renderHome(){
  var total=Object.values(matches).filter(function(m){return m.done&&m.locked;}).length;
  var live=Object.values(matches).filter(function(m){return !m.done&&m.sets&&m.sets.length>0;}).length;
  var todayM=Object.values(matches).filter(function(m){return m.day===sDay;});
  document.getElementById('header-day').textContent='Day '+sDay+' of 4';
  document.getElementById('home-content').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px">'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#4fc3f7">'+total+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">Completed</div></div>'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#ff7043">'+live+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">In Progress</div></div>'+
    '<div class="card" style="margin:0;text-align:center"><div style="font-size:22px;font-weight:800;color:#ffd54f">'+sDay+'</div><div style="font-size:11px;color:#7a9cc4;margin-top:2px">Today (Day)</div></div>'+
    '</div><div class="card"><div class="card-title">Matches Today (Day '+sDay+')</div>'+
    (todayM.length===0?'<div class="empty">No matches today yet</div>':
    todayM.map(function(m){
      var winner=m.done?(m.w===1?m.t1:m.t2):null;
      var sl=m.stage==='group'?'Group '+(m.group||''):m.stage==='league'?'League':m.stage==='semifinal'?'SF':'Final';
      return '<div class="match-item"><div class="match-teams">'+m.t1+'<span class="vs">vs</span>'+m.t2+'</div>'+
        '<div class="match-meta"><span class="dot '+(m.done?'dot-done':'dot-live')+'"></span>'+(m.type==='singles'?'Singles':'Doubles')+' · '+sl+'</div>'+
        (m.done?'<div class="match-result">🏆 '+winner+' won</div>':'<div class="match-result ongoing">In progress</div>')+'</div>';
    }).join(''))+
    '</div>';
}

// Prevent double-tap zoom
var lastTap=0;
document.addEventListener('touchend',function(e){
  var now=Date.now(); if(now-lastTap<300) e.preventDefault(); lastTap=now;
},{passive:false});

renderHome();
</script>
</body>
</html>
